<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="612" viewBox="0 0 1500 612" font-size="12">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap');
      .f { font-family:'Inter','Segoe UI',sans-serif; }
    </style>
  </defs>
  <rect x="0" y="0" width="1500" height="612" fill="#ffffff"/>

  <rect x="0" y="0" width="1500" height="64" fill="#1e1b4b"/>
  <text x="750" y="30" class="f" font-size="20" font-weight="700" fill="#ffffff" text-anchor="middle" letter-spacing="0.5">APEX ACADEMY — DESIGN DOCUMENT</text>
  <text x="750" y="50" class="f" font-size="12" font-style="italic" fill="#c4b5fd" text-anchor="middle">Chapter Pipeline  |  AI Examiner Rubric  |  Scoring Stability</text>

  <!-- ===== 7-PHASE CHAPTER PIPELINE ===== -->
  <rect x="16" y="78" width="1060" height="22" fill="#3730a3"/>
  <text x="546" y="93" class="f" font-size="12" font-weight="700" fill="#fff" text-anchor="middle">7-PHASE CHAPTER PIPELINE</text>
  <g class="f" font-size="12" font-weight="600" fill="#fff">
    <rect x="16" y="100" width="70" height="22" fill="#4c46a8"/><rect x="86" y="100" width="220" height="22" fill="#4c46a8"/><rect x="306" y="100" width="540" height="22" fill="#4c46a8"/><rect x="846" y="100" width="230" height="22" fill="#4c46a8"/>
    <text x="26" y="115">#</text><text x="96" y="115">PHASE</text><text x="316" y="115">WHAT HAPPENS</text><text x="856" y="115">GATE</text>
  </g>
  <g class="f" font-size="12" fill="#2b2b2b">
    <rect x="16" y="122" width="70" height="22" fill="#ecebfb"/><rect x="86" y="122" width="220" height="22" fill="#ecebfb"/><rect x="306" y="122" width="540" height="22" fill="#ecebfb"/><rect x="846" y="122" width="230" height="22" fill="#ecebfb"/>
    <text x="26" y="137" font-weight="600">0</text><text x="96" y="137" font-weight="600">Mission Briefing</text><text x="316" y="137">Goals, key terms, runtime estimate</text><text x="856" y="137">Start button</text>
    <rect x="16" y="144" width="70" height="22" fill="#ffffff"/><rect x="86" y="144" width="220" height="22" fill="#ffffff"/><rect x="306" y="144" width="540" height="22" fill="#ffffff"/><rect x="846" y="144" width="230" height="22" fill="#ffffff"/>
    <text x="26" y="159" font-weight="600">1</text><text x="96" y="159" font-weight="600">Lecture Media</text><text x="316" y="159">Lecture video with real watch-time tracking</text><text x="856" y="159">80% watched</text>
    <rect x="16" y="166" width="70" height="22" fill="#ecebfb"/><rect x="86" y="166" width="220" height="22" fill="#ecebfb"/><rect x="306" y="166" width="540" height="22" fill="#ecebfb"/><rect x="846" y="166" width="230" height="22" fill="#ecebfb"/>
    <text x="26" y="181" font-weight="600">2</text><text x="96" y="181" font-weight="600">Concept Checkpoint</text><text x="316" y="181">3–5 warm-up tasks (matching, sorting, sequence)</text><text x="856" y="181">All completed</text>
    <rect x="16" y="188" width="70" height="22" fill="#fef3da"/><rect x="86" y="188" width="220" height="22" fill="#fef3da"/><rect x="306" y="188" width="540" height="22" fill="#fef3da"/><rect x="846" y="188" width="230" height="22" fill="#fef3da"/>
    <text x="26" y="203" font-weight="600">3</text><text x="96" y="203" font-weight="600">AI Viva</text><text x="316" y="203">AI examiner, 10 questions × 60s, live HP</text><text x="856" y="203">All answered / timeout</text>
    <rect x="16" y="210" width="70" height="22" fill="#ecebfb"/><rect x="86" y="210" width="220" height="22" fill="#ecebfb"/><rect x="306" y="210" width="540" height="22" fill="#ecebfb"/><rect x="846" y="210" width="230" height="22" fill="#ecebfb"/>
    <text x="26" y="225" font-weight="600">4</text><text x="96" y="225" font-weight="600">Rapid Recall</text><text x="316" y="225">Quick MCQ / true-false</text><text x="856" y="225">All completed</text>
    <rect x="16" y="232" width="70" height="22" fill="#ffffff"/><rect x="86" y="232" width="220" height="22" fill="#ffffff"/><rect x="306" y="232" width="540" height="22" fill="#ffffff"/><rect x="846" y="232" width="230" height="22" fill="#ffffff"/>
    <text x="26" y="247" font-weight="600">5</text><text x="96" y="247" font-weight="600">Results + Guide</text><text x="316" y="247">Score, medal, study-guide pack, leaderboard</text><text x="856" y="247">Continue</text>
    <rect x="16" y="254" width="70" height="22" fill="#ecebfb"/><rect x="86" y="254" width="220" height="22" fill="#ecebfb"/><rect x="306" y="254" width="540" height="22" fill="#ecebfb"/><rect x="846" y="254" width="230" height="22" fill="#ecebfb"/>
    <text x="26" y="269" font-weight="600">6</text><text x="96" y="269" font-weight="600">Tutor Replay</text><text x="316" y="269">Unscored replay with AI hints</text><text x="856" y="269">Optional</text>
  </g>

  <!-- ===== AI EXAMINER RUBRIC ===== -->
  <rect x="16" y="290" width="1060" height="22" fill="#3730a3"/>
  <text x="546" y="305" class="f" font-size="12" font-weight="700" fill="#fff" text-anchor="middle">AI EXAMINER — RUBRIC BANDS</text>
  <g class="f" font-size="12" font-weight="600" fill="#fff">
    <rect x="16" y="312" width="220" height="22" fill="#4c46a8"/><rect x="236" y="312" width="140" height="22" fill="#4c46a8"/><rect x="376" y="312" width="700" height="22" fill="#4c46a8"/>
    <text x="26" y="327">BAND</text><text x="246" y="327">POINTS</text><text x="386" y="327">MEANING</text>
  </g>
  <g class="f" font-size="12" fill="#2b2b2b">
    <rect x="16" y="334" width="220" height="22" fill="#d9f0dd"/><rect x="236" y="334" width="140" height="22" fill="#d9f0dd"/><rect x="376" y="334" width="700" height="22" fill="#d9f0dd"/>
    <text x="26" y="349" font-weight="600">strong</text><text x="246" y="349">45</text><text x="386" y="349">Accurate, structured, correct terminology, example</text>
    <rect x="16" y="356" width="220" height="22" fill="#e7f4ea"/><rect x="236" y="356" width="140" height="22" fill="#e7f4ea"/><rect x="376" y="356" width="700" height="22" fill="#e7f4ea"/>
    <text x="26" y="371" font-weight="600">solid</text><text x="246" y="371">33</text><text x="386" y="371">Correct, but shallow</text>
    <rect x="16" y="378" width="220" height="22" fill="#fef3da"/><rect x="236" y="378" width="140" height="22" fill="#fef3da"/><rect x="376" y="378" width="700" height="22" fill="#fef3da"/>
    <text x="26" y="393" font-weight="600">partial</text><text x="246" y="393">22</text><text x="386" y="393">Partial understanding</text>
    <rect x="16" y="400" width="220" height="22" fill="#fbe3d8"/><rect x="236" y="400" width="140" height="22" fill="#fbe3d8"/><rect x="376" y="400" width="700" height="22" fill="#fbe3d8"/>
    <text x="26" y="415" font-weight="600">weak</text><text x="246" y="415">8</text><text x="386" y="415">Guessed, no real understanding</text>
    <rect x="16" y="422" width="220" height="22" fill="#f7d9d9"/><rect x="236" y="422" width="140" height="22" fill="#f7d9d9"/><rect x="376" y="422" width="700" height="22" fill="#f7d9d9"/>
    <text x="26" y="437" font-weight="600">miss</text><text x="246" y="437">0</text><text x="386" y="437">Wrong, off-topic, or timer expired</text>
  </g>

  <!-- ===== SCORING STABILITY ===== -->
  <rect x="16" y="458" width="1060" height="22" fill="#3730a3"/>
  <text x="546" y="473" class="f" font-size="12" font-weight="700" fill="#fff" text-anchor="middle">SCORING STABILITY (taming a non-deterministic LLM)</text>
  <g class="f" font-size="12" font-weight="600" fill="#fff">
    <rect x="16" y="480" width="560" height="22" fill="#4c46a8"/><rect x="576" y="480" width="500" height="22" fill="#4c46a8"/>
    <text x="26" y="495">METHOD</text><text x="586" y="495">STABILITY</text>
  </g>
  <g class="f" font-size="12" fill="#2b2b2b">
    <rect x="16" y="502" width="560" height="22" fill="#f7d9d9"/><rect x="576" y="502" width="500" height="22" fill="#f7d9d9"/>
    <text x="26" y="517">Raw LLM, no anchoring</text><text x="586" y="517">~55%</text>
    <rect x="16" y="524" width="560" height="22" fill="#fef3da"/><rect x="576" y="524" width="500" height="22" fill="#fef3da"/>
    <text x="26" y="539">+ anchor examples in prompt</text><text x="586" y="539">~70–75%</text>
    <rect x="16" y="546" width="560" height="22" fill="#e7f4ea"/><rect x="576" y="546" width="500" height="22" fill="#e7f4ea"/>
    <text x="26" y="561">+ bands instead of exact scores</text><text x="586" y="561">~80–85%</text>
    <rect x="16" y="568" width="560" height="22" fill="#d9f0dd"/><rect x="576" y="568" width="500" height="22" fill="#d9f0dd"/>
    <text x="26" y="583" font-weight="600">+ keyword check</text><text x="586" y="583" font-weight="600">~85%+</text>
  </g>

  <text x="1090" y="500" class="f" font-size="11" fill="#6b7280">Designed an AI</text>
  <text x="1090" y="516" class="f" font-size="11" fill="#6b7280">oral examiner that</text>
  <text x="1090" y="532" class="f" font-size="11" fill="#6b7280">scores reliably —</text>
  <text x="1090" y="548" class="f" font-size="11" fill="#6b7280">bands + anchors +</text>
  <text x="1090" y="564" class="f" font-size="11" fill="#6b7280">keyword checks turn</text>
  <text x="1090" y="580" class="f" font-size="11" fill="#6b7280">~55% into ~85%+.</text>
</svg>
